<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warbander</title>
<style>
body, html {
    background-color: rgb(30, 30, 30);
    color: whitesmoke;
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

main {
    max-width: 1400px;
    margin: 2em auto 2em;
}
h1 {
    margin: 0;
    padding: 0;
}
.hidden {
    display: none;
}.warband {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2em;
}

.warband .stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
}

.warband .stats > div {
    text-align: center;
    background-color: rgb(61, 61, 61);
    padding: .3em .5em;
}

.warband .stats > div:nth-child(12n + 1) {
    border-radius: 5px 0 0 0;
}
.warband .stats > div:nth-child(12n + 6) {
    border-radius: 0 5px 0 0;
}
.warband .stats > div:nth-child(12n + 7) {
    border-radius: 0 0 0 5px;
}
.warband .stats > div:nth-child(12n + 12) {
    border-radius: 0 0 5px 0;
}

.bright {
    background-color: rgb(99, 99, 99) !important;
    margin-top: 2px;
}

.warband .unit-header {
    display: flex;
    justify-content: space-between;
    padding: .5em 1em;
    border-radius: 5px;
}

.purple {
    background-color: purple
}

.blue {
    background-color: dodgerblue;
}
</style>
</head>
<body>
<main></main>
<script defer>
const main = document.querySelector('main');
let warband = {
    name: 'My Warband',
    units: [
        {
            name: 'Captain',
            type: 'hero',
            quantity: 1,
            stats: {
                adv: 5,
                mar: 10,
                dis: 6,
                rat: 5,
                upk: 3,
                lvl: 8,
                hp: 6,
                def: 4,
                res: 3,
                arm: 0,
                att: 1,
                off: 4,
                str: 3,
                ap: 0,
                agi: 6,
                aim: 4,
            },
        },
        {
            name: 'Chicka',
            type: 'henchman',
            quantity: 7,
            stats: {
                adv: 5,
                mar: 10,
                dis: 10,
                rat: 10,
                upk: 10,
                lvl: 10,
                hp: 6,
                def: 4,
                res: 3,
                arm: 0,
                att: 1,
                off: 4,
                str: 3,
                ap: 0,
                agi: 6,
                aim: 14,
            },
        },
    ],
};
let fileHandle = undefined;

function createTag(
    tag,
    classNames
) {
    const element = document.createElement(tag);
    if (classNames) {
        const splits = classNames.split(' ');
        for (const split of splits) {
            if (split) {
                element.classList.add(split);
            }
        }
    }
    return element;
}

async function persist(warband) {
    if (!warband) {
        return;
    }
    if (!fileHandle) {
        return;
    }
    const asString = JSON.stringify(warband);
    const fileStream = await fileHandle.createWritable();
    await fileStream.write(new Blob([asString], {type: "text/plain"}));
    await fileStream.close();
}window.addEventListener("popstate", (event) => {
    const search = event.target.location.search;
    const params = new URLSearchParams(search);
    const page = params.get('page');
    openPage(page);
});

function openPage(page) {
    main.innerHTML = '';
    switch(page) {
        case 'warband': {
            toWarband();
            break;
        }
        default: {
            main.innerHTML = '';
            toWarbandSelection();
            break;
        }
    }
}

function route(page) {
    history.pushState({}, page, `?page=${page}`);
    openPage(page);
}

main.innerHTML = '';
toWarband();async function toWarband() {
    const h1 = createTag('h2');
    h1.innerHTML = warband.name;
    main.appendChild(h1);

    const container = createTag('section', 'warband');
    main.appendChild(container);

    for (const unit of warband.units) {
        renderUnit(container, unit);
    }
}

function renderUnit(parent, unit) {
    const color = unit.type === 'hero' ? 'purple' : 'blue';
    const quantity = unit.quantity <= 1 ? '' : unit.quantity;
    const html = `
<div class="unit-header ${color}">${unit.name} <span>${quantity}<span></div>
<div class="stats">
    <div class="bright">Adv</div>
    <div class="bright">Mar</div>
    <div class="bright">Dis</div>
    <div class="bright">Rat</div>
    <div class="bright">Upk</div>
    <div class="bright">Lvl</div>

    <div>${unit.stats.adv}</div>
    <div>${unit.stats.mar}</div>
    <div>${unit.stats.dis}</div>
    <div>${unit.stats.rat}</div>
    <div>${unit.stats.upk}</div>
    <div>${unit.stats.lvl}</div>

    <div class="bright">HP</div>
    <div class="bright">Def</div>
    <div class="bright">Rest</div>
    <div class="bright">Arm</div>
    <div class="bright"></div>
    <div class="bright"></div>
    <div>${unit.stats.hp}</div>
    <div>${unit.stats.def}</div>
    <div>${unit.stats.res}</div>
    <div>${unit.stats.arm}</div>
    <div></div>
    <div></div>

    <div class="bright">Att</div>
    <div class="bright">Off</div>
    <div class="bright">Str</div>
    <div class="bright">AP</div>
    <div class="bright">Agi</div>
    <div class="bright">Aim</div>

    <div>${unit.stats.att}</div>
    <div>${unit.stats.off}</div>
    <div>${unit.stats.str}</div>
    <div>${unit.stats.ap}</div>
    <div>${unit.stats.agi}</div>
    <div>${unit.stats.aim}</div>
</div>
    `;
    const unitContainer = createTag('div', 'unit');
    unitContainer.innerHTML = html;
    parent.appendChild(unitContainer);
}function toWarbandSelection() {
    fileHandle = undefined;

    const header = createTag('h1');
    header.innerHTML = 'Warband Selection';
    main.appendChild(header);

    const open = createTag('div');
    open.innerHTML = 'Open from File';
    open.addEventListener('click', () => {
        openHandle();
    });
    main.appendChild(open);

    const create = createTag('div');
    create.innerHTML = 'Create Warband';
    create.addEventListener('click', () => {
        createHandle();
    });
    main.appendChild(create);

}

async function openHandle() {
    const options = {
        types: [
            {
                description: "JSON File",
                accept: { "application/json": [".json"] },
            },
        ],
    };
    fileHandle = await window.showOpenFilePicker(options);
    if (fileHandle) {
        route('warband');
    }
}

async function createHandle() {
    const options = {
        suggestedName: 'my_warband.json',
        types: [
            {
                description: "JSON File",
                accept: { "application/json": [".json"] },
            },
        ],
    };
    fileHandle = await window.showSaveFilePicker(options);
    if (fileHandle) {
        route('warband');
    }
}

async function toDisk(asString) {
    console.log(asString);
    let filestream = undefined;
    if (fileHandle) {
        console.log('Already Exists');
        fileStream = await fileHandle.createWritable();
    } else {
        fileHandle = await window.showSaveFilePicker();
        fileStream = await fileHandle.createWritable();
    }
    await fileStream.write(new Blob([asString], {type: "text/plain"}));
    await fileStream.close();
}</script>
</body>
</html>
